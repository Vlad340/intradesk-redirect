<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перенаправление в IntraDesk</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            margin-top: 15vh;
            color: #333;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a { color: #0066cc; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Перенаправление в приложение IntraDesk...</h2>
    <div class="loader" id="loader"></div>
    <p>Если переход не произошел автоматически, <a href="https://intradesk.ru" id="fallback-link">нажмите сюда</a>.</p>
    <p class="error" id="error-msg" style="display:none;"></p>

    <script>
        // 1. Получаем параметр id из URL (например, ?id=12345)
        const urlParams = new URLSearchParams(window.location.search);
        const taskId = urlParams.get('id');

        const errorMsg = document.getElementById('error-msg');
        const loader = document.getElementById('loader');

        if (taskId) {
            // 2. Формируем Deep Link (URI-схему приложения)
            // ВНИМАНИЕ: Замените 'intradesk' на реальную схему, зарегистрированную в вашем мобильном приложении.
            // Примеры: intradesk://task/12345, intradesk://open?id=12345
            const appScheme = `intradesk://task/${taskId}`; 
            
            // 3. Пытаемся открыть приложение
            window.location.href = appScheme;

            // 4. Обработка фоллбэка (если приложение не установлено)
            // Браузеры не дают прямого события "приложение не открылось", поэтому используем таймер.
            // Если через 2 секунды пользователь всё еще на этой странице (приложение не перехватило ссылку),
            // мы скрываем лоадер и предлагаем альтернативные действия.
            setTimeout(() => {
                loader.style.display = 'none';
                document.querySelector('h2').innerText = 'Приложение не найдено';
                // Можно также редиректить в сторы или на лендинг:
                // window.location.href = 'https://intradesk.ru/download'; 
            }, 2000);

        } else {
            // Если id не передан в ссылке
            loader.style.display = 'none';
            errorMsg.style.display = 'block';
            errorMsg.innerText = 'Ошибка: ID задачи не указан в ссылке.';
        }
    </script>
</body>
</html>
