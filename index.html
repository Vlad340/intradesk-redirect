<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переход в IntraDesk...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
        }
        a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
    <script>
        function openApp() {
            // Считываем ID задачи из URL-параметров (?id=20277). Если параметра нет, ставим 20277 по умолчанию.
            const urlParams = new URLSearchParams(window.location.search);
            const taskId = urlParams.get('id') || '20277';
            
            // Формируем ссылки
            const androidIntent = `intent://spar.intradesk.ru/task/list/${taskId}#Intent;scheme=https;package=ru.intravision.intradesk;end`;
            const fallbackUrl = `https://spar.intradesk.ru/task/list/{taskId}`;

            // Обновляем резервную ссылку на странице для ручного клика
            const fallbackLink = document.getElementById('fallback-link');
            if (fallbackLink) {
                fallbackLink.href = fallbackUrl;
            }

            // Логика перенаправления
            if (/Android/i.test(navigator.userAgent)) {
                window.location.href = androidIntent;
                
                // Если приложение не установлено, через 2.5 секунды откроется веб-версия
                setTimeout(() => {
                    window.location.href = fallbackUrl;
                }, 2500);
            } else {
                // Для iOS и ПК сразу открываем веб-версию
                window.location.href = fallbackUrl;
            }
        }
        window.onload = openApp;
    </script>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Перенаправление в IntraDesk...</h1>
        <p>Мы пытаемся открыть задачу в мобильном приложении.</p>
        <p>Если переход не произошел автоматически, <a id="fallback-link" href="https://intradesk.ru">нажмите сюда для перехода в браузерную версию</a>.</p>
    </div>
</body>
</html>
